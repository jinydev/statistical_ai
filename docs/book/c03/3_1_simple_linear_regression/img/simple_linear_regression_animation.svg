<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4e6"/>
      <stop offset="100%" stop-color="#ffe8cc"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>

    <!-- Line Drawing Animation -->
    <clipPath id="revealLine">
      <rect x="80" y="0" width="0" height="450">
        <animate attributeName="width" values="0;600;600" dur="4s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    
    <!-- Bounce Animation for Beta 0 Dot -->
    <animate id="bounce" xlink:href="#beta0dot" attributeName="cy" values="320;315;320;320" dur="2s" repeatCount="indefinite" />

    <!-- Fade In Animation for Beta 1 Triangle -->
    <animate id="fadeT" xlink:href="#triangleGroup" attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.6;0.9;1" dur="4s" repeatCount="indefinite" />
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="15"/>

  <!-- Title Section -->
  <g transform="translate(140, 20)">
    <rect width="520" height="50" fill="#ffffff" rx="25" filter="url(#shadow)"/>
    <text x="260" y="32" font-family="'Jua', sans-serif" font-size="24" fill="#e8590c" text-anchor="middle" font-weight="bold">✨ 단순 선형 회귀: $Y = \beta_0 + \beta_1 X$ ✨</text>
  </g>

  <!-- Axes -->
  <g stroke="#868e96" stroke-width="4" stroke-linecap="round">
    <!-- Y axis -->
    <line x1="80" y1="80" x2="80" y2="380" />
    <polygon points="73,95 87,95 80,75" fill="#868e96" stroke="none"/>
    <text x="40" y="90" font-family="'Jua', sans-serif" font-size="22" fill="#495057" stroke="none">판매량(Y)</text>
    
    <!-- X axis -->
    <line x1="80" y1="380" x2="680" y2="380" />
    <polygon points="665,373 665,387 685,380" fill="#868e96" stroke="none"/>
    <text x="690" y="390" font-family="'Jua', sans-serif" font-size="22" fill="#495057" stroke="none">TV 광고비(X)</text>
  </g>

  <!-- Regression Line (Revealed from left to right) -->
  <g clip-path="url(#revealLine)">
    <line x1="80" y1="320" x2="600" y2="120" stroke="#ff922b" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Intercept (Beta 0) Highlight -->
  <g transform="translate(0, 0)">
    <circle id="beta0dot" cx="80" cy="320" r="10" fill="#f03e3e" stroke="#fff" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Balloon pointing to Beta 0 -->
    <path d="M90,320 L150,290" stroke="#f03e3e" stroke-width="2" stroke-dasharray="4,2"/>
    <rect x="150" y="250" width="160" height="60" fill="#ffffff" rx="10" stroke="#f03e3e" stroke-width="2" filter="url(#shadow)"/>
    <text x="230" y="272" font-family="'Jua', sans-serif" font-size="16" fill="#c92a2a" text-anchor="middle" font-weight="bold">절편 ($\beta_0$)</text>
    <text x="230" y="295" font-family="'Jua', sans-serif" font-size="13" fill="#868e96" text-anchor="middle">광고비가 0일 때의 기본 판매량!</text>
  </g>

  <!-- Slope (Beta 1) Triangle Highlight -->
  <g id="triangleGroup" transform="translate(300, 235)">
    <!-- X increase -->
    <line x1="0" y1="0" x2="130" y2="0" stroke="#339af0" stroke-width="4" stroke-linecap="round"/>
    <!-- Y increase -->
    <line x1="130" y1="0" x2="130" y2="-50" stroke="#fa5252" stroke-width="4" stroke-linecap="round"/>
    
    <text x="65" y="20" font-family="'Jua', sans-serif" font-size="16" fill="#228be6" text-anchor="middle" font-weight="bold">광고비 1칸 증가 (X)</text>
    <text x="140" y="-20" font-family="'Jua', sans-serif" font-size="16" fill="#e03131" font-weight="bold">판매량 증가량</text>
    <text x="140" y="0" font-family="'Jua', sans-serif" font-size="18" fill="#e03131" font-weight="bold">기울기 ($\beta_1$)</text>
  </g>

  <!-- Hat Prop / Comic bubble for hat -->
  <g transform="translate(480, 50)">
    <path d="M30,50 L50,80 L70,50" fill="none" stroke="#ffe066" stroke-width="3"/>
    <rect x="0" y="0" width="220" height="60" fill="#fff3cd" rx="15" stroke="#ffe066" stroke-width="3" filter="url(#shadow)"/>
    <text x="110" y="25" font-family="'Jua', sans-serif" font-size="16" fill="#e67700" text-anchor="middle" font-weight="bold">컴퓨터가 추측해낸 녀석들엔</text>
    <text x="110" y="45" font-family="'Jua', sans-serif" font-size="16" fill="#e67700" text-anchor="middle" font-weight="bold">마법의 모자($\hat{}$)를 씌워주지!</text>
    
    <!-- A drawing of a hat -->
    <path d="M190,5 L200,5 L210,15 L215,20 L175,20 L180,15 Z" fill="#343a40"/>
  </g>

</svg>
