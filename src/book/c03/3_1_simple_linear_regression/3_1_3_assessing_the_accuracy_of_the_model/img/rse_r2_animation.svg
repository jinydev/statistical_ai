<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>

    <!-- Error Bar Animation (Scaling Y) -->
    <!-- Point 1 Error -->
    <animate id="err1_up" xlink:href="#errBar1" attributeName="y2" values="250;220;250" dur="3s" repeatCount="indefinite" />
    <!-- Point 2 Error -->
    <animate id="err2_down" xlink:href="#errBar2" attributeName="y2" values="180;210;180" dur="4s" repeatCount="indefinite" />
    <!-- Point 3 Error -->
    <animate id="err3_up" xlink:href="#errBar3" attributeName="y2" values="120;90;120" dur="2.5s" repeatCount="indefinite" />

    <!-- Battery / Gauge Animation for R^2 -->
    <linearGradient id="r2Fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38d9a9"/>
      <stop offset="61.2%" stop-color="#4dabf7">
        <animate attributeName="offset" values="0%;61.2%;0%" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="61.2%" stop-color="#dee2e6">
        <animate attributeName="offset" values="0%;61.2%;0%" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#dee2e6"/>
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="15"/>

  <!-- Left Side: RSE (Residual Standard Error) -->
  <g transform="translate(20, 20)">
    <!-- Section Box -->
    <rect width="360" height="410" fill="#ffffff" rx="15" filter="url(#shadow)"/>
    <text x="180" y="40" font-family="'Jua', sans-serif" font-size="24" fill="#343a40" text-anchor="middle" font-weight="bold">🎯 RSE: 오차의 "절대적" 거리</text>
    <text x="180" y="65" font-family="'Jua', sans-serif" font-size="14" fill="#868e96" text-anchor="middle">줄자로 잰 평균 빗나감 (단위: 개수, 달러 등)</text>

    <!-- Mini Graph for RSE -->
    <g transform="translate(30, 100)">
      <!-- Axes -->
      <line x1="20" y1="20" x2="20" y2="250" stroke="#ced4da" stroke-width="3"/>
      <line x1="20" y1="250" x2="280" y2="250" stroke="#ced4da" stroke-width="3"/>
      
      <!-- Regression Line -->
      <line x1="40" y1="230" x2="250" y2="60" stroke="#fa5252" stroke-width="4" stroke-linecap="round"/>
      <text x="260" y="60" font-family="'Jua', sans-serif" font-size="16" fill="#fa5252" font-weight="bold">모델 예측선</text>

      <!-- Residuals (Errors) -->
      <!-- Point 1 -->
      <line id="errBar1" x1="80" y1="198" x2="80" y2="250" stroke="#4dabf7" stroke-width="4" stroke-dasharray="4,2"/>
      <circle cx="80" cy="250" r="6" fill="#343a40" />
      <text x="50" y="220" font-family="'Jua', sans-serif" font-size="14" fill="#4dabf7" font-weight="bold">오차(잔차)</text>

      <!-- Point 2 -->
      <line id="errBar2" x1="150" y1="140" x2="150" y2="180" stroke="#4dabf7" stroke-width="4" stroke-dasharray="4,2"/>
      <circle cx="150" cy="180" r="6" fill="#343a40" />

      <!-- Point 3 -->
      <line id="errBar3" x1="210" y1="92" x2="210" y2="120" stroke="#4dabf7" stroke-width="4" stroke-dasharray="4,2"/>
      <circle cx="210" cy="120" r="6" fill="#343a40" />

      <!-- Explanation -->
      <rect x="25" y="270" width="250" height="30" fill="#e7f5ff" rx="10"/>
      <text x="150" y="290" font-family="'Jua', sans-serif" font-size="14" fill="#1864ab" text-anchor="middle">RSE = 모든 파란 점선의 길이 평균!</text>
    </g>
  </g>

  <!-- Right Side: R^2 (R-Squared) -->
  <g transform="translate(400, 20)">
    <!-- Section Box -->
    <rect width="380" height="410" fill="#ffffff" rx="15" filter="url(#shadow)"/>
    <text x="190" y="40" font-family="'Jua', sans-serif" font-size="24" fill="#343a40" text-anchor="middle" font-weight="bold">🔋 R²: 정답 설명 "비율(%)"</text>
    <text x="190" y="65" font-family="'Jua', sans-serif" font-size="14" fill="#868e96" text-anchor="middle">우리가 맞춰낸 정보량의 퍼센티지 (만점: 1.0)</text>

    <g transform="translate(40, 120)">
      <!-- R2 Gauge / Loading Bar -->
      <!-- Background Bar -->
      <rect x="0" y="0" width="300" height="50" fill="#dee2e6" rx="25"/>
      <!-- Filled Bar animated via Gradient -->
      <rect x="0" y="0" width="300" height="50" fill="url(#r2Fill)" rx="25"/>
      
      <!-- Markings -->
      <line x1="0" y1="-10" x2="0" y2="60" stroke="#adb5bd" stroke-width="2" stroke-dasharray="2,2"/>
      <text x="0" y="-15" font-family="'Jua', sans-serif" font-size="14" fill="#495057" text-anchor="middle">0%</text>

      <line x1="300" y1="-10" x2="300" y2="60" stroke="#adb5bd" stroke-width="2" stroke-dasharray="2,2"/>
      <text x="300" y="-15" font-family="'Jua', sans-serif" font-size="14" fill="#495057" text-anchor="middle">100% (완벽!)</text>

      <!-- Current Value Label -->
      <g transform="translate(183.6, 65)"> <!-- 300 * 0.612 = 183.6 -->
        <polygon points="-10,15 10,15 0,0" fill="#d9480f"/>
        <text x="0" y="35" font-family="'Jua', sans-serif" font-size="20" fill="#d9480f" text-anchor="middle" font-weight="bold">61.2% 커버</text>
      </g>
    </g>

    <!-- Comic Explanatory Text for R^2 -->
    <g transform="translate(40, 240)">
      <path d="M10,0 Q150,-20 290,0 Q310,30 290,60 Q150,80 10,60 Q-10,30 10,0" fill="#fff3cd" stroke="#ffe066" stroke-width="3" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.1))"/>
      <text x="150" y="25" font-family="'Jua', sans-serif" font-size="16" fill="#d9480f" text-anchor="middle" font-weight="bold">"판매량이 들쭉날쭉한 전체 이유 중에서</text>
      <text x="150" y="47" font-family="'Jua', sans-serif" font-size="16" fill="#d9480f" text-anchor="middle" font-weight="bold">61.2%정표는 TV 광고 때문이야!"</text>
      
      <rect x="25" y="90" width="250" height="30" fill="#e7f5ff" rx="10"/>
      <text x="150" y="110" font-family="'Jua', sans-serif" font-size="14" fill="#1864ab" text-anchor="middle">R² = 모델이 데이터를 설명하는 환산 점수표</text>
    </g>
  </g>

</svg>
