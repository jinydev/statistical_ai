<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>

    <!-- Red Glow for Population Line -->
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animation Keys for Blue Sample Lines -->
    <!-- Line 1 -->
    <animate id="animLine1" xlink:href="#sample1" attributeName="y2" values="100;130;70;100" dur="4s" repeatCount="indefinite" />
    <animate xlink:href="#sample1" attributeName="y1" values="350;340;360;350" dur="4s" repeatCount="indefinite" />
    <!-- Line 2 -->
    <animate id="animLine2" xlink:href="#sample2" attributeName="y2" values="80;50;110;80" dur="5s" repeatCount="indefinite" />
    <animate xlink:href="#sample2" attributeName="y1" values="370;390;350;370" dur="5s" repeatCount="indefinite" />
    <!-- Line 3 -->
    <animate id="animLine3" xlink:href="#sample3" attributeName="y2" values="120;150;90;120" dur="3.5s" repeatCount="indefinite" />
    <animate xlink:href="#sample3" attributeName="y1" values="330;310;350;330" dur="3.5s" repeatCount="indefinite" />
    <!-- Line 4 -->
    <animate id="animLine4" xlink:href="#sample4" attributeName="y2" values="90;110;60;90" dur="4.2s" repeatCount="indefinite" />
    <animate xlink:href="#sample4" attributeName="y1" values="360;370;340;360" dur="4.2s" repeatCount="indefinite" />
    <!-- Line 5 -->
    <animate id="animLine5" xlink:href="#sample5" attributeName="y2" values="110;80;130;110" dur="4.8s" repeatCount="indefinite" />
    <animate xlink:href="#sample5" attributeName="y1" values="340;320;360;340" dur="4.8s" repeatCount="indefinite" />
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="15"/>
  
  <!-- Graph Axes -->
  <g stroke="#adb5bd" stroke-width="3" stroke-linecap="round">
    <!-- Y axis -->
    <line x1="80" y1="50" x2="80" y2="380" />
    <polygon points="75,60 85,60 80,45" fill="#adb5bd" stroke="none"/>
    <!-- X axis -->
    <line x1="80" y1="380" x2="720" y2="380" />
    <polygon points="710,375 710,385 725,380" fill="#adb5bd" stroke="none"/>
  </g>

  <!-- Axis Labels -->
  <text x="50" y="50" font-family="'Comic Sans MS', 'Jua', 'Nanum Pen Script', sans-serif" font-size="20" fill="#495057" font-weight="bold">Y</text>
  <text x="730" y="390" font-family="'Comic Sans MS', 'Jua', 'Nanum Pen Script', sans-serif" font-size="20" fill="#495057" font-weight="bold">X</text>

  <!-- Title & Explanations -->
  <rect x="180" y="20" width="440" height="40" fill="#ffffff" rx="20" stroke="#ced4da" stroke-width="2"/>
  <text x="400" y="46" font-family="'Jua', sans-serif" font-size="22" fill="#212529" font-weight="bold" text-anchor="middle">모집단 회귀선(빨강)과 표본 최소 제곱선들(파랑)의 댄스파티!</text>

  <!-- Data Point Scatter (Representing sample data sets drawn randomly) -->
  <g fill="#495057" opacity="0.6">
    <circle cx="150" cy="310" r="5" />
    <circle cx="180" cy="280" r="4" />
    <circle cx="210" cy="330" r="6" />
    <circle cx="250" cy="240" r="5" />
    <circle cx="300" cy="250" r="4" />
    <circle cx="330" cy="200" r="5" />
    <circle cx="380" cy="220" r="6" />
    <circle cx="420" cy="180" r="4" />
    <circle cx="460" cy="150" r="5" />
    <circle cx="500" cy="180" r="5" />
    <circle cx="550" cy="120" r="6" />
    <circle cx="600" cy="140" r="4" />
    <circle cx="650" cy="90"  r="5" />
  </g>

  <!-- Sample Regression Lines (Animated, simulating drawing many samples) -->
  <!-- We draw multiple lines radiating randomly around the central real line to show unbiasedness -->
  <!-- Base positions to animate from/to -->
  <line id="sample1" x1="100" y1="350" x2="680" y2="100" stroke="#4dabf7" stroke-width="2" stroke-dasharray="8,4" opacity="0.5" stroke-linecap="round"/>
  <line id="sample2" x1="100" y1="370" x2="680" y2="80" stroke="#4dabf7" stroke-width="2" stroke-dasharray="8,4" opacity="0.5" stroke-linecap="round"/>
  <line id="sample3" x1="100" y1="330" x2="680" y2="120" stroke="#3bc9db" stroke-width="2" stroke-dasharray="8,4" opacity="0.5" stroke-linecap="round"/>
  <line id="sample4" x1="100" y1="360" x2="680" y2="90" stroke="#74c0fc" stroke-width="2" stroke-dasharray="8,4" opacity="0.5" stroke-linecap="round"/>
  <line id="sample5" x1="100" y1="340" x2="680" y2="110" stroke="#38d9a9" stroke-width="2" stroke-dasharray="8,4" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Add a couple of static low opacity lines for texture -->
  <line x1="100" y1="320" x2="680" y2="130" stroke="#a5d8ff" stroke-width="2" stroke-dasharray="5,5" opacity="0.4" />
  <line x1="100" y1="380" x2="680" y2="70" stroke="#a5d8ff" stroke-width="2" stroke-dasharray="5,5" opacity="0.4" />

  <!-- The True Population Regression Line (Red, glowing, perfectly centered through the chaos) -->
  <line x1="100" y1="350" x2="680" y2="100" stroke="#fa5252" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#glowRed)"/>

  <!-- Legend / Info Box -->
  <g transform="translate(480, 260)">
    <rect width="250" height="110" fill="#ffffff" rx="10" stroke="#ced4da" stroke-width="2" opacity="0.9" filter="drop-shadow(3px 3px 5px rgba(0,0,0,0.1))"/>
    
    <line x1="15" y1="25" x2="45" y2="25" stroke="#fa5252" stroke-width="4" stroke-linecap="round" filter="url(#glowRed)"/>
    <text x="55" y="30" font-family="'Jua', sans-serif" font-size="16" fill="#343a40">진짜 모수 회귀선 (f(X))</text>
    <text x="55" y="47" font-family="'Jua', sans-serif" font-size="12" fill="#868e96">영원히 미지의 신의 영역...</text>

    <line x1="15" y1="70" x2="45" y2="70" stroke="#4dabf7" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>
    <text x="55" y="75" font-family="'Jua', sans-serif" font-size="16" fill="#343a40">개별 표본 최소 제곱선들</text>
    <text x="55" y="92" font-family="'Jua', sans-serif" font-size="12" fill="#868e96">오차 폭주! 하지만 평균을 내면?</text>
  </g>

  <!-- Comic Text Bubble -->
  <g transform="translate(100, 110)">
    <path d="M0,0 Q120,-30 240,0 Q260,30 240,60 Q120,90 0,60 Q-20,30 0,0" fill="#fff3cd" stroke="#ffe066" stroke-width="3" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.1))"/>
    <polygon points="120,74 100,104 140,74" fill="#fff3cd" stroke="#ffe066" stroke-width="2"/>
    <!-- Overlap line removal trick -->
    <path d="M121,74 L139,74" stroke="#fff3cd" stroke-width="5" /> 

    <text x="120" y="25" font-family="'Jua', sans-serif" font-size="18" fill="#d9480f" text-anchor="middle" font-weight="bold">"선 하나하나는 빗나가겠지만,</text>
    <text x="120" y="48" font-family="'Jua', sans-serif" font-size="18" fill="#d9480f" text-anchor="middle" font-weight="bold">다 모으면 정중앙이야!"</text>
  </g>

</svg>
